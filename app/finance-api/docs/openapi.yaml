openapi: 3.0.3
info:
  title: Finance API
  description: 家計データを提供するAPI
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: ローカル開発環境

paths:
  /api/expenses:
    get:
      summary: 支出一覧取得
      description: 指定した年月の支出一覧を返す
      parameters:
        - name: year
          in: query
          required: true
          description: 対象年（例：2026）
          schema:
            type: integer
            example: 2026
        - name: month
          in: query
          required: true
          description: 対象月（例：3）
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 3
      responses:
        "200":
          description: 支出一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseListResponse'
        "400":
          description: リクエストパラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/expenses/summary:
    get:
      summary: カテゴリ別支出集計
      description: 指定した年月のカテゴリ別支出合計を返す
      parameters:
        - name: year
          in: query
          required: true
          description: 対象年（例：2026）
          schema:
            type: integer
            example: 2026
        - name: month
          in: query
          required: true
          description: 対象月（例：3）
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 3
      responses:
        "200":
          description: カテゴリ別集計
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseSummaryResponse'
        "400":
          description: リクエストパラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Expense:
      type: object
      properties:
        id:
          type: string
          description: 支出ID
          example: "abc123"
        date:
          type: string
          format: date
          description: 利用日
          example: "2026-03-15"
        description:
          type: string
          description: 利用内容
          example: "スーパーマーケット"
        amount:
          type: integer
          description: 金額（円）
          example: 3500
        category:
          type: string
          description: カテゴリ
          example: "食費"

    ExpenseListResponse:
      type: object
      properties:
        year:
          type: integer
          example: 2026
        month:
          type: integer
          example: 3
        total:
          type: integer
          description: 合計金額（円）
          example: 150000
        expenses:
          type: array
          items:
            $ref: '#/components/schemas/Expense'

    ExpenseSummaryResponse:
      type: object
      properties:
        year:
          type: integer
          example: 2026
        month:
          type: integer
          example: 3
        total:
          type: integer
          description: 合計金額（円）
          example: 150000
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategorySummary'

    CategorySummary:
      type: object
      properties:
        category:
          type: string
          example: "食費"
        amount:
          type: integer
          example: 45000
        percentage:
          type: number
          format: float
          description: 全体に占める割合（%）
          example: 30.0

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: "INVALID_PARAMETER"
        message:
          type: string
          example: "monthの形式が不正です"
